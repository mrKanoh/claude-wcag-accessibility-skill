name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify CSV integrity (all 14 databases)
        run: python scripts/search.py wcag --level AA --output json > /dev/null

      - name: Verify cross-database search
        run: python scripts/search.py all --keyword contrast --output json > /dev/null
