<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Date Picker — WCAG 2.2 AA</title>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; }

    /* ── Date picker wrapper ── */
    .datepicker-wrapper { position: relative; display: inline-block; }

    /* ── Input + button ── */
    .datepicker-input-group { display: flex; gap: 0; }
    .datepicker-input {
      padding: .5rem .75rem; border: 2px solid #6b7280;
      border-radius: 6px 0 0 6px; font-size: 1rem; width: 12rem;
    }
    .datepicker-input:focus {
      outline: 3px solid #1d4ed8; outline-offset: 2px; border-color: #1d4ed8;
    }
    .datepicker-toggle {
      padding: .5rem .75rem; background: #1d4ed8; color: #fff;
      border: 2px solid #1d4ed8; border-radius: 0 6px 6px 0;
      cursor: pointer; font-size: 1rem; min-width: 44px; min-height: 44px;
    }
    .datepicker-toggle:focus-visible {
      outline: 3px solid #1d4ed8; outline-offset: 3px;
    }
    .datepicker-toggle:hover { background: #1e40af; }

    /* ── Calendar dialog ── */
    .datepicker-dialog {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: #fff; border: 2px solid #6b7280; border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15); z-index: 100; min-width: 280px;
    }
    .datepicker-dialog[hidden] { display: none; }

    /* ── Month navigation ── */
    .datepicker-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1rem; border-bottom: 1px solid #e5e7eb;
    }
    .datepicker-nav-btn {
      background: none; border: 2px solid transparent; border-radius: 6px;
      cursor: pointer; padding: .25rem .5rem; font-size: 1.2rem;
      min-width: 36px; min-height: 36px; color: #374151;
    }
    .datepicker-nav-btn:hover { background: #f3f4f6; border-color: #d1d5db; }
    .datepicker-nav-btn:focus-visible { outline: 3px solid #1d4ed8; outline-offset: 2px; }
    .datepicker-month-label { font-weight: 600; font-size: 1rem; }

    /* ── Day-of-week headers ── */
    .datepicker-grid { padding: .5rem 1rem 1rem; }
    .datepicker-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; margin-bottom: .25rem;
    }
    .datepicker-weekday { font-size: .75rem; color: #6b7280; padding: .25rem; }

    /* ── Day cells ── */
    .datepicker-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .datepicker-day {
      background: none; border: 2px solid transparent; border-radius: 6px;
      padding: .4rem; text-align: center; cursor: pointer; font-size: .9rem;
      min-width: 36px; min-height: 36px; color: #111827;
    }
    .datepicker-day:hover:not([disabled]) { background: #dbeafe; }
    .datepicker-day:focus-visible { outline: 3px solid #1d4ed8; outline-offset: 1px; }
    .datepicker-day[aria-selected="true"] {
      background: #1d4ed8; color: #fff; border-color: #1d4ed8;
    }
    .datepicker-day[aria-current="date"] { border-color: #1d4ed8; font-weight: 700; }
    .datepicker-day[aria-disabled="true"], .datepicker-day[disabled] {
      color: #9ca3af; cursor: not-allowed;
    }
    .datepicker-day.outside-month { color: #d1d5db; }

    /* ── Status / error ── */
    .datepicker-status { margin-top: .5rem; font-size: .875rem; color: #dc2626; }
  </style>
</head>
<body>

<h1>Accessible Date Picker</h1>
<p>WCAG 2.1/2.2 AA compliant. Keyboard: Arrow keys navigate, Enter/Space select, Escape closes, Page Up/Down change months, Home/End go to first/last of week.</p>

<div class="datepicker-wrapper" id="dp-wrapper">

  <!-- Visible text input (also accepts typed dates) -->
  <div class="datepicker-input-group">
    <label for="dp-input" class="sr-only">Select date (MM/DD/YYYY)</label>
    <input
      id="dp-input"
      class="datepicker-input"
      type="text"
      placeholder="MM/DD/YYYY"
      autocomplete="off"
      aria-haspopup="dialog"
      aria-expanded="false"
      aria-controls="dp-dialog"
    >
    <button
      id="dp-toggle"
      class="datepicker-toggle"
      type="button"
      aria-label="Open date picker"
      aria-haspopup="dialog"
      aria-expanded="false"
      aria-controls="dp-dialog"
    >
      📅
    </button>
  </div>

  <!-- Error / status (screen reader live region) -->
  <div id="dp-status" class="datepicker-status" role="alert" aria-live="assertive"></div>

  <!-- Calendar dialog -->
  <div
    id="dp-dialog"
    class="datepicker-dialog"
    role="dialog"
    aria-modal="true"
    aria-label="Date picker"
    hidden
  >
    <!-- Month navigation -->
    <div class="datepicker-header">
      <button
        id="dp-prev-year"
        class="datepicker-nav-btn"
        type="button"
        aria-label="Previous year"
      >«</button>
      <button
        id="dp-prev-month"
        class="datepicker-nav-btn"
        type="button"
        aria-label="Previous month"
      >‹</button>
      <span
        id="dp-month-label"
        class="datepicker-month-label"
        aria-live="polite"
        aria-atomic="true"
      ></span>
      <button
        id="dp-next-month"
        class="datepicker-nav-btn"
        type="button"
        aria-label="Next month"
      >›</button>
      <button
        id="dp-next-year"
        class="datepicker-nav-btn"
        type="button"
        aria-label="Next year"
      >»</button>
    </div>

    <!-- Day-of-week headers -->
    <div class="datepicker-grid">
      <div class="datepicker-weekdays" aria-hidden="true">
        <span class="datepicker-weekday">Su</span>
        <span class="datepicker-weekday">Mo</span>
        <span class="datepicker-weekday">Tu</span>
        <span class="datepicker-weekday">We</span>
        <span class="datepicker-weekday">Th</span>
        <span class="datepicker-weekday">Fr</span>
        <span class="datepicker-weekday">Sa</span>
      </div>
      <!-- Day grid — generated by JS -->
      <div
        id="dp-grid"
        class="datepicker-days"
        role="grid"
        aria-labelledby="dp-month-label"
      ></div>
    </div>
  </div>
</div>

<style>
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>

<script>
(function () {
  'use strict';

  /* ── State ── */
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();       // 0-indexed
  let selectedDate = null;               // Date | null
  let focusedDate = new Date(today);
  let isOpen = false;

  /* ── Elements ── */
  const input       = document.getElementById('dp-input');
  const toggleBtn   = document.getElementById('dp-toggle');
  const dialog      = document.getElementById('dp-dialog');
  const grid        = document.getElementById('dp-grid');
  const monthLabel  = document.getElementById('dp-month-label');
  const statusEl    = document.getElementById('dp-status');
  const prevYear    = document.getElementById('dp-prev-year');
  const prevMonth   = document.getElementById('dp-prev-month');
  const nextMonth   = document.getElementById('dp-next-month');
  const nextYear    = document.getElementById('dp-next-year');

  const MONTHS = [
    'January','February','March','April','May','June',
    'July','August','September','October','November','December'
  ];
  const DAYS_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  /* ── Helpers ── */
  function sameDay(a, b) {
    return a && b &&
      a.getFullYear() === b.getFullYear() &&
      a.getMonth()    === b.getMonth()    &&
      a.getDate()     === b.getDate();
  }
  function toInputString(date) {
    if (!date) return '';
    const m = String(date.getMonth() + 1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${m}/${d}/${date.getFullYear()}`;
  }
  function parseInput(str) {
    const match = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!match) return null;
    const date = new Date(+match[3], +match[1]-1, +match[2]);
    return isNaN(date) ? null : date;
  }

  /* ── Open / close ── */
  function openDialog() {
    focusedDate = selectedDate ? new Date(selectedDate) : new Date(today);
    viewYear  = focusedDate.getFullYear();
    viewMonth = focusedDate.getMonth();
    renderGrid();
    dialog.removeAttribute('hidden');
    input.setAttribute('aria-expanded', 'true');
    toggleBtn.setAttribute('aria-expanded', 'true');
    isOpen = true;
    // Focus the focused date cell
    requestAnimationFrame(() => {
      const focused = grid.querySelector('[tabindex="0"]');
      if (focused) focused.focus();
    });
  }

  function closeDialog(returnFocus = true) {
    dialog.setAttribute('hidden', '');
    input.setAttribute('aria-expanded', 'false');
    toggleBtn.setAttribute('aria-expanded', 'false');
    isOpen = false;
    if (returnFocus) toggleBtn.focus();
  }

  /* ── Render ── */
  function renderGrid() {
    monthLabel.textContent = `${MONTHS[viewMonth]} ${viewYear}`;

    const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    grid.innerHTML = '';

    // Previous month padding
    for (let i = firstDay - 1; i >= 0; i--) {
      const day = daysInPrev - i;
      grid.appendChild(makeCell(new Date(viewYear, viewMonth - 1, day), true));
    }
    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
      grid.appendChild(makeCell(new Date(viewYear, viewMonth, d), false));
    }
    // Next month padding (fill to complete 6 rows = 42 cells)
    const total = grid.children.length;
    const remaining = (Math.ceil(total / 7) * 7) - total;
    for (let d = 1; d <= remaining; d++) {
      grid.appendChild(makeCell(new Date(viewYear, viewMonth + 1, d), true));
    }
  }

  function makeCell(date, outside) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'datepicker-day' + (outside ? ' outside-month' : '');
    btn.textContent = date.getDate();

    // Accessible name: "15 Wednesday January 2026"
    btn.setAttribute('aria-label',
      `${date.getDate()} ${DAYS_LONG[date.getDay()]} ${MONTHS[date.getMonth()]} ${date.getFullYear()}`
    );

    if (sameDay(date, today)) btn.setAttribute('aria-current', 'date');
    if (sameDay(date, selectedDate)) btn.setAttribute('aria-selected', 'true');

    // Roving tabindex: only focused date is reachable
    btn.setAttribute('tabindex', sameDay(date, focusedDate) ? '0' : '-1');

    btn.addEventListener('click', () => selectDate(date));
    return btn;
  }

  function selectDate(date) {
    selectedDate = date;
    input.value = toInputString(date);
    statusEl.textContent = '';
    closeDialog();
  }

  /* ── Keyboard navigation ── */
  grid.addEventListener('keydown', e => {
    const key = e.key;
    let delta = 0;

    if (key === 'ArrowRight')  delta = 1;
    else if (key === 'ArrowLeft')  delta = -1;
    else if (key === 'ArrowDown')  delta = 7;
    else if (key === 'ArrowUp')    delta = -7;
    else if (key === 'Home') {
      delta = -(focusedDate.getDay()); // start of week
    } else if (key === 'End') {
      delta = 6 - focusedDate.getDay(); // end of week
    } else if (key === 'PageDown') {
      e.preventDefault();
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      focusedDate = new Date(viewYear, viewMonth, Math.min(focusedDate.getDate(), new Date(viewYear, viewMonth+1, 0).getDate()));
      renderGrid(); focusCurrent(); return;
    } else if (key === 'PageUp') {
      e.preventDefault();
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      focusedDate = new Date(viewYear, viewMonth, Math.min(focusedDate.getDate(), new Date(viewYear, viewMonth+1, 0).getDate()));
      renderGrid(); focusCurrent(); return;
    } else if (key === 'Enter' || key === ' ') {
      e.preventDefault();
      selectDate(new Date(focusedDate));
      return;
    } else if (key === 'Escape') {
      closeDialog();
      return;
    } else if (key === 'Tab') {
      closeDialog(false);
      return;
    } else return;

    e.preventDefault();
    focusedDate = new Date(focusedDate.getTime() + delta * 86400000);
    if (focusedDate.getMonth() !== viewMonth || focusedDate.getFullYear() !== viewYear) {
      viewYear  = focusedDate.getFullYear();
      viewMonth = focusedDate.getMonth();
      renderGrid();
    } else {
      // Update tabindex without full re-render
      grid.querySelectorAll('.datepicker-day').forEach(btn => {
        btn.setAttribute('tabindex', '-1');
      });
      const targetLabel = `${focusedDate.getDate()} ${DAYS_LONG[focusedDate.getDay()]} ${MONTHS[focusedDate.getMonth()]} ${focusedDate.getFullYear()}`;
      const targetBtn = [...grid.querySelectorAll('.datepicker-day')]
        .find(b => b.getAttribute('aria-label') === targetLabel);
      if (targetBtn) { targetBtn.setAttribute('tabindex', '0'); targetBtn.focus(); }
    }
    focusCurrent();
  });

  function focusCurrent() {
    requestAnimationFrame(() => {
      const focused = grid.querySelector('[tabindex="0"]');
      if (focused) focused.focus();
    });
  }

  /* ── Toggle + input events ── */
  toggleBtn.addEventListener('click', () => isOpen ? closeDialog() : openDialog());

  input.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === 'ArrowDown') && !isOpen) {
      e.preventDefault(); openDialog();
    }
  });

  input.addEventListener('change', () => {
    const parsed = parseInput(input.value);
    if (input.value && !parsed) {
      statusEl.textContent = 'Invalid date. Use MM/DD/YYYY format.';
    } else {
      statusEl.textContent = '';
      selectedDate = parsed;
    }
  });

  /* ── Nav buttons ── */
  prevMonth.addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderGrid();
  });
  nextMonth.addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderGrid();
  });
  prevYear.addEventListener('click', () => { viewYear--; renderGrid(); });
  nextYear.addEventListener('click', () => { viewYear++; renderGrid(); });

  /* ── Close on outside click ── */
  document.addEventListener('click', e => {
    if (isOpen && !document.getElementById('dp-wrapper').contains(e.target)) {
      closeDialog(false);
    }
  });

  /* ── ESC anywhere ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isOpen) closeDialog();
  });

})();
</script>
</body>
</html>
